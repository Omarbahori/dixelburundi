name: Build cPanel Standalone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONTENT_STORAGE: file
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build production app
        env:
          NODE_ENV: production
        run: npm run build:cpanel

      - name: Prepare cPanel artifact
        run: npm run package:cpanel:standalone

      - name: Archive artifact
        run: |
          cd .cpanel-deploy
          zip -r ../dixel-cpanel-standalone-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dixel-cpanel-standalone-linux
          path: dixel-cpanel-standalone-linux.zip
